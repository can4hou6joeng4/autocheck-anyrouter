name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production
    env:
      PYTHONIOENCODING: utf-8
      # 仓库可见性，用于隐私控制
      REPO_VISIBILITY: ${{ github.event.repository.visibility }}
      # 时区设置（可选，默认为 Asia/Shanghai 中国时区）
      TZ: ${{ secrets.TZ }}
      # 时间戳格式（可选，默认为 %Y-%m-%d %H:%M:%S）
      TIMESTAMP_FORMAT: ${{ secrets.TIMESTAMP_FORMAT }}
      # 账号配置
      ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}
      # 是否显示敏感信息
      SHOW_SENSITIVE_INFO: ${{ secrets.SHOW_SENSITIVE_INFO }}
      # 通知配置
      DINGTALK_NOTIF_CONFIG: ${{ secrets.DINGTALK_NOTIF_CONFIG }}
      EMAIL_NOTIF_CONFIG: ${{ secrets.EMAIL_NOTIF_CONFIG }}
      PUSHPLUS_NOTIF_CONFIG: ${{ secrets.PUSHPLUS_NOTIF_CONFIG }}
      SERVERPUSH_NOTIF_CONFIG: ${{ secrets.SERVERPUSH_NOTIF_CONFIG }}
      FEISHU_NOTIF_CONFIG: ${{ secrets.FEISHU_NOTIF_CONFIG }}
      WECOM_NOTIF_CONFIG: ${{ secrets.WECOM_NOTIF_CONFIG }}
      TELEGRAM_NOTIF_CONFIG: ${{ secrets.TELEGRAM_NOTIF_CONFIG }}
      # 通知触发条件（默认仅在全部账号都检测到实际余额变化时通知，可通过仓库变量 NOTIFY_TRIGGERS 覆盖）
      NOTIFY_TRIGGERS: ${{ vars.NOTIFY_TRIGGERS || 'balance_changed' }}
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6

      - name: 🔑 加载账号配置
        env:
          ALL_SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          python3 - <<'PY'
          import json
          import os

          secrets = json.loads(os.environ['ALL_SECRETS_JSON'])
          exported = 0
          heredoc = '__ANYROUTER_ENV__'

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as env_file:
              for key, value in secrets.items():
                  if not key.startswith('ANYROUTER_ACCOUNT_') or not value:
                      continue

                  print(f'::add-mask::{value}')
                  env_file.write(f'{key}<<{heredoc}\n{value}\n{heredoc}\n')
                  exported += 1

          print(f'已导出 {exported} 个 ANYROUTER_ACCOUNT_* 账号配置')
          PY

      - name: 🔧 安装 Mise
        uses: jdx/mise-action@v4
        with:
          cache_key: "{{default}}-${{ hashFiles('pyproject.toml') }}"

      - name: ⚙️ 安装依赖
        run: mise run install

      - name: 🎭 配置 Playwright 环境
        uses: ./.github/actions/setup-playwright
        id: playwright-setup

      - name: 💾 恢复余额历史缓存
        uses: actions/cache@v5
        with:
          path: balance_hash.txt
          key: balance-hash-${{ github.run_id }}
          restore-keys: |
            balance-hash-

      - name: 🚀 执行签到任务
        run: mise run checkin
